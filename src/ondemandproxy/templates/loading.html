<!DOCTYPE html>
<html lang="fr">
    <!-- Inspired from https://git.pofilo.fr/pofilo/docker-maintenance -->
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="refresh" content="{{RETRY_AFTER}}">
        <title>Démarrage du service...</title>
        <style>
            h1 {
                font-size: 50px;
            }
            body {
                font: 20px Helvetica, sans-serif;
                color: #02324D;
                text-align: center;
                text-decoration: none;
                background-color: #E6E6E6;
            }
            .spinner {
                width: 50px;
                height: 50px;
                border: 4px solid #FFFFFF;
                border-top-color: #02324D;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin: 0 auto 1.5rem;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
        </style>
    </head>
    <body>
        <h1>Démarrage de {{SERVICE_NAME}}...</h1>
        <div class="spinner"></div>
        <p>La page va se rafraichir automatiquement une fois le service démarré.</p>
    </body>
</html>
